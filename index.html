<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprende Jugando con Papá</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary:   #6c63ff; --primary2:  #a78bfa;
            --success:   #10d982; --success2:  #34d399;
            --error:     #f43f5e; --warning:   #f59e0b;
            --bg:        #0f0e1a;
            --card:      #1c1a2e; --card2:     #26233d;
            --border:    rgba(255,255,255,0.08);
            --text:      #f0ecff; --text2:     #9d98b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 80%, rgba(16,217,130,0.08) 0%, transparent 60%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; user-select: none; -webkit-user-select: none; touch-action: manipulation; padding: 16px;
        }

        .screen {
            background: var(--card); border: 1px solid var(--border);
            padding: 28px 24px; border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,99,255,0.1);
            width: 100%; max-width: 480px; display: none;
            animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        #menu { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .header-logo { text-align: center; margin-bottom: 6px; }
        .header-logo .emoji { font-size: 52px; line-height: 1; filter: drop-shadow(0 4px 12px rgba(108,99,255,0.5)); }
        
        h1 {
            font-size: 22px; font-weight: 900; color: var(--text); text-align: center; margin: 8px 0 4px;
            background: linear-gradient(135deg, var(--primary2), var(--success2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { text-align: center; color: var(--text2); font-size: 13px; margin-bottom: 22px; }

        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .stat-chip {
            background: var(--card2); border: 1px solid var(--border); border-radius: 50px;
            padding: 6px 16px; font-size: 13px; font-weight: 700; color: var(--text2); display: flex; align-items: center; gap: 6px;
        }
        .stat-chip span { color: var(--primary2); font-size: 15px; }

        .btn-menu {
            display: flex; align-items: center; gap: 14px; width: 100%; padding: 16px 20px; margin: 8px 0;
            font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif;
            border: 1px solid var(--border); border-radius: 16px; cursor: pointer;
            color: var(--text); transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s; background: var(--card2); text-align: left;
        }
        .btn-menu .icon { font-size: 28px; flex-shrink: 0; }
        .btn-menu .label { flex: 1; }
        .btn-menu .arrow { opacity: 0.4; font-size: 18px; }
        .btn-menu:active { transform: scale(0.96); }

        .btn-menu.reading  { border-color: rgba(108,99,255,0.4); background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(167,139,250,0.06)); }
        .btn-menu.reading:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(108,99,255,0.25); }
        .btn-menu.math     { border-color: rgba(245,158,11,0.4); background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(251,191,36,0.06)); }
        .btn-menu.math:hover { border-color: var(--warning); box-shadow: 0 0 20px rgba(245,158,11,0.25); }
        .btn-menu.sem      { border-color: rgba(167,139,250,0.4); background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(196,181,253,0.06)); }
        .btn-menu.sem:hover { border-color: var(--primary2); box-shadow: 0 0 20px rgba(167,139,250,0.25); }
        .btn-menu.geo      { border-color: rgba(16,217,130,0.4); background: linear-gradient(135deg, rgba(16,217,130,0.12), rgba(52,211,153,0.06)); }
        .btn-menu.geo:hover { border-color: var(--success); box-shadow: 0 0 20px rgba(16,217,130,0.25); }
        .btn-menu.count    { border-color: rgba(244,63,94,0.4); background: linear-gradient(135deg, rgba(244,63,94,0.12), rgba(251,113,133,0.06)); }
        .btn-menu.count:hover { border-color: var(--error); box-shadow: 0 0 20px rgba(244,63,94,0.25); }

        .btn-menu.sub { padding: 13px 18px; font-size: 14px; margin: 5px 0; }

        .btn-back {
            margin-top: 20px; width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 14px;
            background: transparent; color: var(--text2); font-size: 15px; font-weight: 700;
            font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.15s;
        }
        .btn-back:hover { background: var(--card2); color: var(--text); }
        .btn-back:active { transform: scale(0.97); }

        #nivel-actual { font-size: 11px; font-weight: 800; color: var(--primary2); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 10px; }

        #progress-container { width: 100%; background: rgba(255,255,255,0.05); border-radius: 50px; height: 10px; margin-bottom: 8px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 50px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }

        .streak-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 2px; font-size: 13px; color: var(--text2); font-weight: 700; }
        #streak-display { display: flex; align-items: center; gap: 5px; color: var(--warning); font-weight: 900; }
        #streak-display .fire { font-size: 18px; }
        #remaining-display { color: var(--text2); }
        #remaining-val { color: var(--success); font-weight: 900; font-size: 15px; }

        #display-text {
            font-size: clamp(48px, 12vw, 90px); font-weight: 900; color: var(--text); min-height: 130px;
            display: flex; align-items: center; justify-content: center; margin: 10px 0 16px; text-align: center; letter-spacing: 3px; line-height: 1.1; transition: color 0.2s;
        }

        #count-display {
            font-size: 38px;
            line-height: 1.4;
            text-align: center;
            min-height: 120px;
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
        }
        .emoji-count-item {
            font-size: 52px;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            background: rgba(255,255,255,0.02);
        }
        .emoji-count-item:hover {
            background: rgba(255,255,255,0.05);
            transform: scale(1.05);
        }
        .emoji-count-item.counted {
            border-color: var(--success);
            background: rgba(16, 217, 130, 0.15);
            box-shadow: 0 0 15px rgba(16, 217, 130, 0.3);
            transform: scale(0.95);
        }
        .sum-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: clamp(24px, 6vw, 42px);
            font-weight: 900;
            margin: 15px 0;
            color: var(--text);
        }
        .math-flow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .math-group-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 20px;
            min-width: 110px;
        }
        .math-emojis-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            min-height: 80px;
            align-items: center;
        }
        .math-input-box {
            font-size: 24px;
            font-weight: 900;
            width: 50px;
            height: 50px;
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            transition: all 0.15s;
            cursor: pointer;
        }
        .math-input-box.active {
            border-color: var(--primary);
            color: var(--primary2);
            box-shadow: 0 0 10px rgba(108,99,255,0.4);
            animation: pulseGlow 1.5s infinite alternate;
        }
        @keyframes pulseGlow {
            from { box-shadow: 0 0 4px rgba(108,99,255,0.2); }
            to { box-shadow: 0 0 14px rgba(108,99,255,0.6); }
        }
        .math-input-box.correct {
            border-color: var(--success);
            color: var(--success);
            background: rgba(16,217,130,0.15);
            box-shadow: 0 0 10px rgba(16,217,130,0.2);
        }
        .math-operator-sign {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary2);
        }
        .connect-game {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 100%;
            min-height: 250px;
            position: relative;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 10px;
        }
        .connect-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 15px;
            z-index: 2;
        }
        .connect-node {
            font-size: 44px;
            width: 68px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--card2);
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .connect-node.letter {
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
        }
        .connect-node:hover {
            border-color: var(--primary2);
            transform: scale(1.05);
        }
        .connect-node.selected {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108,99,255,0.4);
            background: rgba(108,99,255,0.1);
        }
        .connect-node.connected {
            border-color: var(--success);
            background: rgba(16, 217, 130, 0.08);
            cursor: default;
        }
        .connect-svg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .connect-line {
            stroke-width: 6px;
            stroke-linecap: round;
            opacity: 0.85;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }
        .pattern-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .pattern-item {
            font-size: 48px;
            background: var(--card2);
            border: 1px solid var(--border);
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
        }
        .pattern-question {
            border: 2px dashed var(--warning);
            color: var(--warning);
            font-weight: 900;
            font-size: 36px;
        }
        .audio-speaker {
            font-size: 72px;
            cursor: pointer;
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 15px auto;
            box-shadow: 0 8px 25px rgba(108,99,255,0.4);
            transition: transform 0.1s;
        }
        .audio-speaker:active {
            transform: scale(0.92);
        }
        #numpad { display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-num {
            padding: 14px 0; font-size: 26px; font-weight: 800; font-family: 'Nunito', sans-serif;
            border-radius: 14px; border: 1px solid var(--border); background: var(--card2); cursor: pointer;
            color: var(--text); transition: transform 0.1s, background 0.15s, border-color 0.15s;
        }
        .btn-num:active { transform: scale(0.88); background: var(--primary); border-color: var(--primary); }
        .btn-num:hover  { border-color: var(--primary2); }

        #grid-opciones { display: none; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .btn-opcion {
            font-size: 52px; padding: 18px; border-radius: 18px; border: 2px solid var(--border);
            background: var(--card2); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
        }
        .btn-opcion svg { width: 65px; height: 65px; }
        .btn-opcion:active { transform: scale(0.9); }
        .btn-opcion:hover  { border-color: var(--primary2); box-shadow: 0 0 15px rgba(108,99,255,0.2); }

        .controls { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn-action {
            font-size: 36px; width: 82px; height: 82px; border-radius: 50%; border: none; color: white;
            cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.1s, box-shadow 0.15s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .btn-action:active { transform: scale(0.88); }
        .btn-correct   { background: linear-gradient(135deg, var(--success), #059669); }
        .btn-correct:hover  { box-shadow: 0 6px 25px rgba(16,217,130,0.45); }
        .btn-incorrect { background: linear-gradient(135deg, var(--error), #be123c); }
        .btn-incorrect:hover { box-shadow: 0 6px 25px rgba(244,63,94,0.45); }

        @keyframes shake {
            0%,100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-14px) rotate(-2deg); }
            40% { transform: translateX(14px) rotate(2deg); }
            60% { transform: translateX(-10px) rotate(-1deg); }
            80% { transform: translateX(10px) rotate(1deg); }
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
        .error-shake  { animation: shake 0.45s ease-out; }
        .success-text { color: var(--success) !important; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }

        #result-screen .result-emoji { font-size: 72px; text-align: center; margin: 10px 0; filter: drop-shadow(0 4px 16px rgba(16,217,130,0.5)); }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .result-card { background: var(--card2); border: 1px solid var(--border); border-radius: 16px; padding: 14px; text-align: center; }
        .result-card .val { font-size: 30px; font-weight: 900; color: var(--primary2); }
        .result-card .lbl { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        @media (max-width: 360px) {
            .screen { padding: 20px 16px; border-radius: 20px; }
            #display-text { font-size: 44px; min-height: 110px; }
            .btn-action { width: 72px; height: 72px; font-size: 30px; }
        }
    </style>
</head>
<body>

    <!-- MENÚ PRINCIPAL -->
    <div id="menu" class="screen">
        <div class="header-logo"><div class="emoji">🚀</div></div>
        <h1>Aprende Jugando con Papá</h1>
        <p class="subtitle">Ecosistema de Neuro-Aprendizaje Infinito para Agustín</p>

        <div class="stats-bar">
            <div class="stat-chip">🔥 Racha <span id="menu-streak">0</span></div>
            <div class="stat-chip">⭐ Sesiones <span id="menu-sessions">0</span></div>
        </div>

        <button class="btn-menu reading" onclick="mostrarSubMenu()">
            <span class="icon">🔤</span>
            <span class="label">Lectura<br><small style="font-weight:600;opacity:.6">Sílabas y Diccionario Gigante</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu math" onclick="iniciar('mate')">
            <span class="icon">🔢</span>
            <span class="label">Matemáticas<br><small style="font-weight:600;opacity:.6">Antecesor y Sucesor</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu math" onclick="iniciar('sumas')">
            <span class="icon">➕</span>
            <span class="label">Sumas Visuales<br><small style="font-weight:600;opacity:.6">Suma frutas con guía</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu math" onclick="iniciar('restas')">
            <span class="icon">➖</span>
            <span class="label">Restas Visuales<br><small style="font-weight:600;opacity:.6">Resta frutas con guía</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu count" onclick="iniciar('conteo')">
            <span class="icon">🧮</span>
            <span class="label">Conteo Interactivo<br><small style="font-weight:600;opacity:.6">Toca para contar y marcar</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu sem" onclick="iniciar('semantica')">
            <span class="icon">🧩</span>
            <span class="label">Semántica<br><small style="font-weight:600;opacity:.6">Palabra → Librería Visual</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu sem" onclick="iniciar('patrones')">
            <span class="icon">🔁</span>
            <span class="label">Completar Patrones<br><small style="font-weight:600;opacity:.6">Niveles 1 al 4 con subniveles</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu reading" onclick="iniciar('escucha')">
            <span class="icon">🔊</span>
            <span class="label">Escucha y Elige<br><small style="font-weight:600;opacity:.6">Escucha la voz y elige</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu reading" onclick="iniciar('conectar')">
            <span class="icon">🔌</span>
            <span class="label">Conectar Letras<br><small style="font-weight:600;opacity:.6">Une el dibujo con su letra inicial</small></span><span class="arrow">›</span>
        </button>
        <button class="btn-menu geo" onclick="iniciar('geometria')">
            <span class="icon">📐</span>
            <span class="label">Geometría 2D y 3D<br><small style="font-weight:600;opacity:.6">Todas las formas</small></span><span class="arrow">›</span>
        </button>
    </div>

    <!-- SUBMENÚ LECTURA -->
    <div id="submenu" class="screen">
        <h1>Ruta de Lectura</h1>
        <p class="subtitle">El sistema repite lo pendiente dinámicamente</p>
        <button class="btn-menu sub reading" onclick="iniciar('vocales')"><span class="icon">🅰</span><span class="label">1. Vocales</span><span class="arrow">›</span></button>
        <button class="btn-menu sub reading" onclick="iniciar('silabas_simples')"><span class="icon">📖</span><span class="label">2. Sílabas Simples (MA, LA, DE…)</span><span class="arrow">›</span></button>
        <button class="btn-menu sub reading" onclick="iniciar('silabas_complejas')"><span class="icon">🌀</span><span class="label">3. Sílabas de 3 letras (TRA, CLA…)</span><span class="arrow">›</span></button>
        <button class="btn-menu sub reading" onclick="iniciar('palabras_basicas')"><span class="icon">🏠</span><span class="label">4. Palabras Básicas (CA-SA)</span><span class="arrow">›</span></button>
        <button class="btn-menu sub reading" onclick="iniciar('palabras_complejas')"><span class="icon">🌟</span><span class="label">5. Palabras Complejas (SI-LLA)</span><span class="arrow">›</span></button>
        <button class="btn-menu sub reading" onclick="iniciar('palabras_largas')"><span class="icon">🦋</span><span class="label">6. Palabras Largas (CA-BA-LLO)</span><span class="arrow">›</span></button>
        <button class="btn-back" onclick="volverMenuPrincipal()">⬅ Volver al Menú</button>
    </div>

    <!-- JUEGO -->
    <div id="game" class="screen">
        <div id="nivel-actual"></div>

        <div id="progress-container"><div id="progress-bar"></div></div>

        <div class="streak-row">
            <div id="streak-display"><span class="fire">🔥</span><span id="streak-val">0</span></div>
            <div id="remaining-display">Faltan: <span id="remaining-val">0</span> 🎉</div>
        </div>

        <div id="display-text">?</div>
        <div id="count-display"></div>
        <div id="numpad"></div>
        <div id="grid-opciones"></div>

        <div id="standard-controls" class="controls">
            <button class="btn-action btn-incorrect" onclick="marcar(false)">✖</button>
            <button class="btn-action btn-correct" onclick="marcar(true)">✔</button>
        </div>

        <button class="btn-back" onclick="mostrarResultado()">⏹ Salir de Práctica</button>
    </div>

    <!-- PANTALLA DE RESULTADOS -->
    <div id="result-screen" class="screen">
        <div class="result-emoji">🏆</div>
        <h1>¡Meta Cumplida!</h1>
        <p class="subtitle" id="result-subtitle">¡Agustín lo hizo increíble!</p>
        <div class="result-grid">
            <div class="result-card"><div class="val" id="res-total">0</div><div class="lbl">Aciertos</div></div>
            <div class="result-card"><div class="val" id="res-errores">0</div><div class="lbl">Intentos Extra</div></div>
        </div>
        <button class="btn-menu math" style="margin-top:10px" onclick="seguirJugando()">
            <span class="icon">🚀</span><span class="label">¡Seguir Jugando! (+10 Meta)</span><span class="arrow">›</span>
        </button>

    function mostrarPantalla(id) {

    function iniciar(modo) {
        modoActual = modo;
        metaSesion = 20; // 20 Puntos para la meta
        sesionCorrectas = 0;
        sesionErrores = 0;

        mostrarPantalla('game');
        document.getElementById('nivel-actual').innerText = formatModoLabel(modo);

        if (modo === 'mate' || modo === 'conteo' || modo === 'sumas' || modo === 'restas' || modo === 'patrones' || modo === 'escucha' || modo === 'conectar') {
            srModo = false;
        } else {
            // Inicializar Spaced Repetition (infinito)
            const fuente = (modo === 'semantica') ? semanticaDB : (modo === 'geometria') ? geometriaDB : lecturaDB[modo];
            // Se inician con Cooldown (cd) aleatorio entre 0 a 5, para no repetir orden siempre inicial.
            srQueue = fuente.map(item => ({ item, cd: Math.floor(Math.random() * Math.min(6, fuente.length)) }));
            shuffle(srQueue);
            srModo = true;
        }

        siguiente();
    }

    function formatModoLabel(m) {
        const map = { vocales:'Vocales', silabas_simples:'Sílabas Simples', silabas_complejas:'Sílabas Complejas', palabras_basicas:'Palabras Básicas', palabras_complejas:'Palabras Complejas', palabras_largas:'Palabras Largas', mate:'Matemáticas', sumas:'Sumas Visuales', restas:'Restas Visuales', conteo:'Conteo', semantica:'Semántica', patrones:'Completar Patrones', escucha:'Escucha y Elige', conectar:'Conectar Letras', geometria:'Geometría' };
        return map[m] || m;
    }

    function generarMate() {
        let ans;
        if(Math.random() < 0.33) {
            ans = Math.floor(Math.random()*9)+1; itemActual = {texto:`${ans-1} , _ , ${ans+1}`, ans};
        } else if(Math.random() < 0.5) {
            ans = Math.floor(Math.random()*10); itemActual = {texto:`_ , ${ans+1}`, ans};
        } else {
            ans = Math.floor(Math.random()*10)+1; itemActual = {texto:`${ans-1} , _`, ans};
        }
    }

    function generarConteo() {
        const char = emojiSetsPool[Math.floor(Math.random() * emojiSetsPool.length)];
        const cantidad = Math.floor(Math.random()*8)+2; // de 2 a 9 emojis
        itemActual = { char, ans: cantidad };
    }

    let mathStep = 1;

    function generarSumas() {
        const char = emojiSetsPool[Math.floor(Math.random() * emojiSetsPool.length)];
        const num1 = Math.floor(Math.random() * 4) + 1; // 1 a 4
        const num2 = Math.floor(Math.random() * 4) + 1; // 1 a 4
        const ans = num1 + num2;
        itemActual = { char, num1, num2, ans };
        mathStep = 1;
    }

    function generarRestas() {
        const char = emojiSetsPool[Math.floor(Math.random() * emojiSetsPool.length)];
        const num1 = Math.floor(Math.random() * 5) + 4; // 4 a 8
        const num2 = Math.floor(Math.random() * (num1 - 2)) + 1; // 1 a num1 - 2
        const ans = num1 - num2;
        itemActual = { char, num1, num2, ans };
        mathStep = 1;
    }

    function generarPatrones() {
        const level = Math.floor(Math.random() * 4) + 1;
        const idx1 = Math.floor(Math.random() * emojiSetsPool.length);
        let idx2 = Math.floor(Math.random() * emojiSetsPool.length);
        while (idx2 === idx1) { idx2 = Math.floor(Math.random() * emojiSetsPool.length); }
        let idx3 = Math.floor(Math.random() * emojiSetsPool.length);
        while (idx3 === idx1 || idx3 === idx2) { idx3 = Math.floor(Math.random() * emojiSetsPool.length); }
        
        const A = emojiSetsPool[idx1];
        const B = emojiSetsPool[idx2];
        const C = emojiSetsPool[idx3];
        
        let seq = [];
        let ans = "";
        let presentEmojis = [];
        
        if (level === 1) {
            seq = [A, B, A, B];
            ans = A;
            presentEmojis = [A, B];
        } else if (level === 2) {
            seq = [A, A, B, A, A];
            ans = B;
            presentEmojis = [A, B];
        } else if (level === 3) {
            seq = [A, B, C, A, B];
            ans = C;
            presentEmojis = [A, B, C];
        } else {
            seq = [A, B, B, C, A, B, B];
            ans = C;
            presentEmojis = [A, B, C];
        }
        itemActual = { seq, ans, presentEmojis, level };
    }

    function generarEscucha() {
        const target = semanticaDB[Math.floor(Math.random() * semanticaDB.length)];
        itemActual = { w: target.w, e: target.e, ans: target.e };
    }

    function getStartingLetter(word) {
        let firstChar = word.trim().charAt(0).toUpperCase();
        const map = {'Á':'A', 'É':'E', 'Í':'I', 'Ó':'O', 'Ú':'U'};
        return map[firstChar] || firstChar;
    }

    function generarConectar() {
        let items = [];
        let letters = new Set();
        let pool = [...semanticaDB];
        shuffle(pool);
        
        for (let p of pool) {
            let letter = getStartingLetter(p.w);
            if (!letters.has(letter)) {
                items.push(p);
                letters.add(letter);
                if (items.length === 3) break;
            }
        }
        if (items.length < 3) {
            items = pool.slice(0, 3);
        }
        itemActual = { items };
    }

    function reproducirAudioActual() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = `¿Dónde está el ${itemActual.w.toLowerCase()}?`;
            msg.lang = 'es-ES';
            msg.rate = 0.85;
            msg.pitch = 1.1;
            window.speechSynthesis.speak(msg);
        }
    }

        if (sesionCorrectas >= metaSesion) {

        actualizarProgreso();
        actualizarStreakUI();

        if (modoActual === 'mate') {
            generarMate(); prepararInterfaz();

            generarConteo(); prepararInterfaz();
        } else if (modoActual === 'sumas') {
            generarSumas(); prepararInterfaz();
        } else if (modoActual === 'restas') {
            generarRestas(); prepararInterfaz();
        } else if (modoActual === 'patrones') {
            generarPatrones(); prepararInterfaz();
        } else if (modoActual === 'escucha') {
            generarEscucha(); prepararInterfaz();
        } else if (modoActual === 'conectar') {
            generarConectar(); prepararInterfaz();
        } else {
            // Lógica SR Avanzada
            let candidates = srQueue.filter(x => x.cd <= 0);
            if(candidates.length === 0) {
                // Viaje en el tiempo si ninguna palabra está ready
                const minCd = Math.min(...srQueue.map(x => x.cd));
                srQueue.forEach(x => { x.cd -= minCd; });
                candidates = srQueue.filter(x => x.cd <= 0);
            }
            shuffle(candidates);
            const entry = candidates[0]; // Extrae la elegida
            
            if(modoActual === 'semantica') {
                itemActual = { w: entry.item.w, e: entry.item.e, _srEntry: entry };
            } else if (modoActual === 'geometria') {
                itemActual = { w: entry.item.w, s: entry.item.s, _srEntry: entry };
            } else {
                itemActual = { texto: entry.item, _srEntry: entry };
            }
            prepararInterfaz();
        }
    }

    function prepararInterfaz() {
        document.getElementById('numpad').style.display = 'none';
        document.getElementById('grid-opciones').style.display = 'none';
        document.getElementById('standard-controls').style.display = 'flex';
        document.getElementById('count-display').style.display = 'none';
        document.getElementById('display-text').style.display = 'flex';

        const display = document.getElementById('display-text');
        display.className = '';

        if (modoActual === 'mate') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('numpad').style.display = 'grid';
            renderNumpad(0,10);
            ejecutarScrambler(itemActual.texto);
        } else if (modoActual === 'conteo') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('display-text').style.display = 'none';
            document.getElementById('numpad').style.display = 'grid';
            renderNumpad(1,10);
            const cd = document.getElementById('count-display');
            cd.style.display = 'flex';
            cd.innerHTML = '';
            for (let i = 0; i < itemActual.ans; i++) {
                const el = document.createElement('span');
                el.className = 'emoji-count-item';
                el.innerText = itemActual.char;
                el.onclick = (e) => {
                    e.currentTarget.classList.toggle('counted');
                };
                cd.appendChild(el);
            }
        } else if (modoActual === 'sumas' || modoActual === 'restas') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('display-text').style.display = 'none';
            document.getElementById('numpad').style.display = 'grid';
            renderNumpad(1,10);
            const cd = document.getElementById('count-display');
            cd.style.display = 'flex';
            const sign = (modoActual === 'sumas') ? '+' : '-';
            cd.innerHTML = `
                <div class="math-flow-container">
                    <div class="math-group-wrapper">
                        <div class="math-emojis-box" id="math-emojis-1"></div>
                        <div class="math-input-box active" id="math-box-1">?</div>
                    </div>
                    <div class="math-operator-sign">${sign}</div>
                    <div class="math-group-wrapper">
                        <div class="math-emojis-box" id="math-emojis-2"></div>
                        <div class="math-input-box" id="math-box-2">?</div>
                    </div>
                    <div class="math-operator-sign">=</div>
                    <div class="math-input-box" id="math-box-res">?</div>
                </div>
            `;
            const b1 = document.getElementById('math-emojis-1');
            for(let i=0; i<itemActual.num1; i++) {
                const el = document.createElement('span');
                el.className = 'emoji-count-item';
                el.style.fontSize = '34px'; el.style.width = '46px'; el.style.height = '46px';
                el.innerText = itemActual.char;
                el.onclick = (e) => e.currentTarget.classList.toggle('counted');
                b1.appendChild(el);
            }
            const b2 = document.getElementById('math-emojis-2');
            for(let i=0; i<itemActual.num2; i++) {
                const el = document.createElement('span');
                el.className = 'emoji-count-item';
                el.style.fontSize = '34px'; el.style.width = '46px'; el.style.height = '46px';
                el.innerText = itemActual.char;
                el.onclick = (e) => e.currentTarget.classList.toggle('counted');
                b2.appendChild(el);
            }
        } else if (modoActual === 'patrones') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('grid-opciones').style.display = 'grid';
            const cd = document.getElementById('count-display');
            cd.style.display = 'flex';
            let seqH = '<div class="pattern-container">';
            itemActual.seq.forEach(em => {
                seqH += `<div class="pattern-item">${em}</div>`;
            });
            seqH += '<div class="pattern-item pattern-question">?</div></div>';
            cd.innerHTML = seqH;

            let correctHTML = itemActual.ans;
            let optsArray = [...itemActual.presentEmojis];
            let pool = emojiSetsPool.filter(x => !optsArray.includes(x));
            shuffle(pool);
            while (optsArray.length < 4) {
                optsArray.push(pool.pop());
            }
            shuffle(optsArray);
            setupOpciones(optsArray, correctHTML);
        } else if (modoActual === 'conectar') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('display-text').style.display = 'none';
            const cd = document.getElementById('count-display');
            cd.style.display = 'flex';
            
            let letterOpts = itemActual.items.map(it => ({ letter: getStartingLetter(it.w), word: it.w }));
            shuffle(letterOpts);
            
            let html = `
                <div class="connect-game">
                    <svg class="connect-svg-lines" id="connect-svg"></svg>
                    <div class="connect-column emojis" id="connect-col-emojis">
            `;
            itemActual.items.forEach((it, idx) => {
                html += `<div class="connect-node emoji" data-word="${it.w}" id="node-emoji-${idx}" onclick="selectConnectNode(this, 'emoji')">${it.e}</div>`;
            });
            html += `
                    </div>
                    <div class="connect-column letters" id="connect-col-letters">
            `;
            letterOpts.forEach((lo, idx) => {
                html += `<div class="connect-node letter" data-letter="${lo.letter}" id="node-letter-${idx}" onclick="selectConnectNode(this, 'letter')">${lo.letter}</div>`;
            });
            html += `
                    </div>
                </div>
            `;
            cd.innerHTML = html;
            
            selectedEmojiNode = null;
            selectedLetterNode = null;
            connectedCount = 0;
            activeConnections = [];
            
            window.onresize = redrawConnectLines;
        } else if (modoActual === 'escucha') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('grid-opciones').style.display = 'grid';
            const cd = document.getElementById('count-display');
            cd.style.display = 'flex';
            cd.innerHTML = `<div class="audio-speaker" onclick="reproducirAudioActual()">🔊</div>`;
            
            reproducirAudioActual();

            let correctHTML = itemActual.e;
            let pool = semanticaDB.filter(x => x.w !== itemActual.w);
            shuffle(pool);
            let optsArray = [correctHTML, pool[0].e, pool[1].e, pool[2].e];
            shuffle(optsArray);
            setupOpciones(optsArray, correctHTML);
        } else if (modoActual === 'semantica') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('grid-opciones').style.display = 'grid';
            ejecutarScrambler(itemActual.w);
            
            // Picks visuales dinámicos
            let correctHTML = itemActual.e;
            let pool = semanticaDB.filter(x => x.w !== itemActual.w);
            shuffle(pool);
            let optsArray = [correctHTML, pool[0].e, pool[1].e, pool[2].e];
            shuffle(optsArray);
            setupOpciones(optsArray, correctHTML);

        } else if (modoActual === 'geometria') {
            document.getElementById('standard-controls').style.display = 'none';
            document.getElementById('grid-opciones').style.display = 'grid';
            ejecutarScrambler(itemActual.w);
            
            let correctHTML = itemActual.s;
            let pool = geometriaDB.filter(x => x.w !== itemActual.w);
            shuffle(pool);
            let optsArray = [correctHTML, pool[0].s, pool[1].s, pool[2].s];
            shuffle(optsArray);
            setupOpciones(optsArray, correctHTML);

        } else {
            // LECTURA
            ejecutarScrambler(itemActual.texto);
        }

        // Bajar cd de la cola entera de fondo por cada turno gastado
        if(srModo) { srQueue.forEach(x => { if(x.cd > 0) x.cd--; }); }
    }

    function ejecutarScrambler(textoFinal) {
        const displayObj = document.getElementById('display-text');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let it = 0, max = 10;
        const keep = new Set(['-',',',' ','_','(',')',':','Á','É','Í','Ó','Ú','Ñ','á','é','í','ó','ú','ñ']);

        const iv = setInterval(() => {
            displayObj.innerText = textoFinal.split('').map(ch => keep.has(ch) ? ch : chars[Math.floor(Math.random()*chars.length)]).join('');
            it++;
            if(it >= max){ clearInterval(iv); displayObj.innerText = textoFinal; }
        }, 45);
    }

    function renderNumpad(min, max){
        const pad = document.getElementById('numpad');
        pad.innerHTML = ''; let nums = [];
        for(let i=min; i<=max; i++) nums.push(i);
        shuffle(nums);
        nums.forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'btn-num'; btn.innerText = n;
            btn.onclick = () => checkNum(n); pad.appendChild(btn);
        });
    }

    function checkNum(n) {
        if (modoActual === 'sumas' || modoActual === 'restas') {
            if (mathStep === 1) {
                if (n === itemActual.num1) {
                    const box1 = document.getElementById('math-box-1');
                    box1.innerText = n;
                    box1.className = 'math-input-box correct';
                    mathStep = 2;
                    const box2 = document.getElementById('math-box-2');
                    box2.className = 'math-input-box active';
                } else {
                    triggerError();
                }
            } else if (mathStep === 2) {
                if (n === itemActual.num2) {
                    const box2 = document.getElementById('math-box-2');
                    box2.innerText = n;
                    box2.className = 'math-input-box correct';
                    mathStep = 3;
                    const boxRes = document.getElementById('math-box-res');
                    boxRes.className = 'math-input-box active';
                } else {
                    triggerError();
                }
            } else if (mathStep === 3) {
                if (n === itemActual.ans) {
                    const boxRes = document.getElementById('math-box-res');
                    boxRes.innerText = n;
                    boxRes.className = 'math-input-box correct';
                    marcarUI(true);
                } else {
                    triggerError();
                }
            }
        } else {
            if(n === itemActual.ans){
                if (modoActual === 'conteo') {
                    const cd = document.getElementById('count-display');
                    cd.innerHTML = `<span style="color:var(--success); font-size: 52px; font-weight:900;">¡${n}! 🎉</span>`;
                } else {
                    const display = document.getElementById('display-text');
                    display.innerHTML = itemActual.texto.replace('_', `<span style="color:var(--success)">${n}</span>`);
                }
                marcarUI(true);
            } else { triggerError(); }
        }
    }

    function setupOpciones(optsArray, correctHTML) {
        const grid = document.getElementById('grid-opciones'); grid.innerHTML = '';
        optsArray.forEach(html => {
            const btn = document.createElement('button');
            btn.className = 'btn-opcion'; btn.innerHTML = html;
            btn.onclick = () => {
                if(html === correctHTML){
                    if (modoActual === 'patrones') {
                        const questionBox = document.querySelector('.pattern-question');
                        if (questionBox) {
                            questionBox.innerText = html;
                            questionBox.style.borderColor = 'var(--success)';
                            questionBox.style.color = 'var(--success)';
                        }
                    }
                    marcarUI(true);
                } else {
                    triggerError();
                }
            };
            grid.appendChild(btn);
        });
    }

    // ============================================================
    // CONECTAR LETRAS LOGIC
    // ============================================================
    function selectConnectNode(el, type) {
        if (el.classList.contains('connected')) return;
        
        if (type === 'emoji') {
            if (selectedEmojiNode) selectedEmojiNode.classList.remove('selected');
            selectedEmojiNode = el;
            el.classList.add('selected');
        } else {
            if (selectedLetterNode) selectedLetterNode.classList.remove('selected');
            selectedLetterNode = el;
            el.classList.add('selected');
        }
        
        if (selectedEmojiNode && selectedLetterNode) {
            const word = selectedEmojiNode.getAttribute('data-word');
            const letter = selectedLetterNode.getAttribute('data-letter');
            
            if (getStartingLetter(word) === letter) {
                selectedEmojiNode.classList.remove('selected');
                selectedLetterNode.classList.remove('selected');
                selectedEmojiNode.classList.add('connected');
                selectedLetterNode.classList.add('connected');
                
                const color = getRandomConnectColor();
                drawLine(selectedEmojiNode, selectedLetterNode, color);
                activeConnections.push({ n1: selectedEmojiNode.id, n2: selectedLetterNode.id, color });
                
                selectedEmojiNode = null;
                selectedLetterNode = null;
                connectedCount++;
                
                if (connectedCount === 3) {
                    setTimeout(() => {
                        marcarUI(true);
                    }, 800);
                }
            } else {
                const eNode = selectedEmojiNode;
                const lNode = selectedLetterNode;
                eNode.classList.add('error-shake');
                lNode.classList.add('error-shake');
                triggerError();
                setTimeout(() => {
                    eNode.classList.remove('error-shake', 'selected');
                    lNode.classList.remove('error-shake', 'selected');
                }, 500);
                selectedEmojiNode = null;
                selectedLetterNode = null;
            }
        }
    }
    
    function getRandomConnectColor() {
        const colors = ['#6c63ff', '#10d982', '#f59e0b', '#f43f5e', '#a78bfa'];
        return colors[Math.floor(Math.random() * colors.length)];
    }
    
    function drawLine(node1, node2, color) {
        const svg = document.getElementById('connect-svg');
        if (!svg) return;
        const svgRect = svg.getBoundingClientRect();
        const r1 = node1.getBoundingClientRect();
        const r2 = node2.getBoundingClientRect();
        
        const x1 = r1.left - svgRect.left + r1.width / 2;
        const y1 = r1.top - svgRect.top + r1.height / 2;
        const x2 = r2.left - svgRect.left + r2.width / 2;
        const y2 = r2.top - svgRect.top + r2.height / 2;
        
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', color);
        line.setAttribute('class', 'connect-line');
        svg.appendChild(line);
    }
    
    function redrawConnectLines() {
        const svg = document.getElementById('connect-svg');
        if (!svg) return;
        svg.innerHTML = '';
        activeConnections.forEach(conn => {
            const n1 = document.getElementById(conn.n1);
            const n2 = document.getElementById(conn.n2);
            if (n1 && n2) {
                drawLine(n1, n2, conn.color);
            }
        });
    }

    // ============================================================
    // RESPUESTAS Y SR ENGINE UPDATE
    // ============================================================
    function triggerError() {
        sesionErrores++;
        
        const d = document.getElementById('display-text');
        d.classList.remove('error-shake'); void d.offsetWidth; d.classList.add('error-shake');

        const cd = document.getElementById('count-display');
        cd.classList.remove('error-shake'); void cd.offsetWidth; cd.classList.add('error-shake');

        // SR: Error = ¡Aparecerá muy pronto! en 1 o 2 turnos
        if(srModo && itemActual._srEntry){
            itemActual._srEntry.cd = Math.floor(Math.random() * 2) + 1;
        }

        streakActual = 0; localStorage.setItem('agustin_streak', 0);
    }

    function marcarUI(esCorrecto) {
        if(esCorrecto){
            sesionCorrectas++; streakActual++;
            if(streakActual > parseInt(localStorage.getItem('agustin_streak')||0)){
                localStorage.setItem('agustin_streak', streakActual);
            }
            actualizarStreakUI();

            document.getElementById('display-text').classList.add('success-text');

            const pc = Math.min(50 + streakActual * 5, 120);
            confetti({ particleCount: pc, spread: 70, origin: {y: 0.6} });

            // SR: Correcto = Se pospone para el futuro (entre 5 y 12 turnos)
            if(srModo && itemActual._srEntry){
                const spread = Math.min(10, srQueue.length / 2); // balance dinámico
                itemActual._srEntry.cd = Math.floor(Math.random() * 6) + Math.max(3, spread);
            }

            setTimeout(siguiente, 1200);
        } else {
            triggerError();
        }
    }

    function marcar(esCorrecto) {
        if(esCorrecto) marcarUI(true);
        else { triggerError(); setTimeout(siguiente, 600); }
    }

    // ============================================================
    // UI UPDATES
    // ============================================================
    function actualizarProgreso() {
        const pct = Math.min((sesionCorrectas / metaSesion) * 100, 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('remaining-val').textContent = Math.max(0, metaSesion - sesionCorrectas);
    }

    function actualizarStreakUI(){ document.getElementById('streak-val').textContent = streakActual; }

    function actualizarMenuStats(){
        document.getElementById('menu-streak').textContent = localStorage.getItem('agustin_streak') || 0;
        document.getElementById('menu-sessions').textContent = localStorage.getItem('agustin_sessions') || 0;
    }

    // ============================================================
    // RESULTADOS
    // ============================================================
    function mostrarResultado(){
        sesionesTotal++;
        localStorage.setItem('agustin_sessions', sesionesTotal);

        document.getElementById('res-total').textContent = sesionCorrectas;
        document.getElementById('res-errores').textContent = sesionErrores;

        const phrases = ['¡Agustín lo hizo increíble! 🌟','¡Fantástico trabajo! 🏆','¡Eres un genio del aprendizaje! 🧠','¡Papá está muy orgulloso! ❤️'];
        document.getElementById('result-subtitle').textContent = phrases[Math.floor(Math.random()*phrases.length)];

        mostrarPantalla('result-screen');
        confetti({ particleCount: 250, spread: 120, origin: {y: 0.4} });
        setTimeout(()=>confetti({particleCount:100, spread:80, origin:{y:0.6}}), 600);
    }

    function seguirJugando() {
        metaSesion += 10;
        mostrarPantalla('game');
        siguiente();
    }

    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } }

    actualizarMenuStats();
    </script>
